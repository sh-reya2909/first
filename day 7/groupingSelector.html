<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #note,.abc,h1{
              color:white;
              background-color: black;
        }
        div {
            background-color: blanchedalmond;
            width:125px;
        }

        div h2{
            color:blue;
        }

        div p{
            color:purple;
        }

        div button{
            background-color: chartreuse;
        }
    </style>
</head>
<body>
     <h2 class="abc">Web Development</h2>

    <p id="note">This is Example of class selector</p>

    <button class="abc">Logout</button>

    <p>Universal Selector</p>

    <h1>Hello</h1>

    <div>
        <h2>Iphone</h2>
        <p>Rs 99999</p>
        <button>Buy Now</button>
    </div>
</body>
</html>
